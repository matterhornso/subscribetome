name: 💡 Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Start with the pain, not the solution. What are you trying to do?
      placeholder: When I …, I can't … because …
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like subscribetome to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, existing tools, or workarounds you've tried.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Fit
      description: subscribetome keeps API keys out of the AI chat transcript. Local-first, no backend, no telemetry.
      options:
        - label: This request is consistent with that scope (or explains why it should expand it).
          required: true
